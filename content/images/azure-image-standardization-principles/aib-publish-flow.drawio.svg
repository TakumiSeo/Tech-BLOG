<svg xmlns="http://www.w3.org/2000/svg" width="1960" height="430" viewBox="0 0 1960 430" font-family="Segoe UI, Meiryo, Hiragino Kaku Gothic ProN, sans-serif">
  <defs>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 z" fill="#ED7100"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 z" fill="#248814"/></marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 z" fill="#0078D4"/></marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 z" fill="#DD344C"/></marker>
  </defs>

  <text x="20" y="46" font-size="20" font-weight="bold" fill="#222">VM Image Builder によるゴールデンイメージ発行の自動化</text>

  <!-- connectors -->
  <line x1="210" y1="228" x2="258" y2="228" stroke="#ED7100" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="450" y1="228" x2="498" y2="228" stroke="#ED7100" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="690" y1="228" x2="738" y2="228" stroke="#ED7100" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="930" y1="228" x2="978" y2="228" stroke="#ED7100" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="1170" y1="228" x2="1218" y2="228" stroke="#248814" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="1194" y="218" font-size="12" fill="#248814" text-anchor="middle">合格</text>
  <line x1="1410" y1="228" x2="1458" y2="228" stroke="#248814" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="1650" y1="228" x2="1698" y2="228" stroke="#0078D4" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- feedback loop: test fail -> back to customize -->
  <polyline points="1075,180 1075,110 595,110 595,178" fill="none" stroke="#DD344C" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowRed)"/>
  <text x="835" y="102" font-size="12" fill="#DD344C" text-anchor="middle">失敗 → 差し戻し</text>

  <!-- boxes -->
  <g>
    <rect x="20" y="180" width="190" height="96" rx="8" fill="#FFF2CC" stroke="#D6B656" stroke-width="2"/>
    <text x="115" y="222" font-size="13" text-anchor="middle" fill="#222">月次トリガー</text>
    <text x="115" y="242" font-size="13" text-anchor="middle" fill="#222">(Scheduler)</text>
  </g>
  <g>
    <rect x="260" y="180" width="190" height="96" rx="8" fill="#E6F2FA" stroke="#0078D4" stroke-width="2"/>
    <text x="355" y="222" font-size="13" text-anchor="middle" fill="#222">Marketplace</text>
    <text x="355" y="242" font-size="13" text-anchor="middle" fill="#222">最新ベースイメージ取得</text>
  </g>
  <g>
    <rect x="500" y="180" width="190" height="96" rx="8" fill="#E6F2FA" stroke="#0078D4" stroke-width="2"/>
    <text x="595" y="210" font-size="13" text-anchor="middle" fill="#222">VM Image Builder</text>
    <text x="595" y="230" font-size="13" text-anchor="middle" fill="#222">カスタマイズ</text>
    <text x="595" y="250" font-size="10" text-anchor="middle" fill="#444">ハードニング/エージェント/証明書</text>
  </g>
  <g>
    <rect x="740" y="180" width="190" height="96" rx="8" fill="#E6F2FA" stroke="#0078D4" stroke-width="2"/>
    <text x="835" y="222" font-size="13" text-anchor="middle" fill="#222">タトゥーイング</text>
    <text x="835" y="242" font-size="13" text-anchor="middle" fill="#222">+ SBOM 生成</text>
  </g>
  <g>
    <rect x="980" y="180" width="190" height="96" rx="8" fill="#FFF2CC" stroke="#D6B656" stroke-width="2"/>
    <text x="1075" y="222" font-size="13" text-anchor="middle" fill="#222">自動テスト</text>
    <text x="1075" y="242" font-size="12" text-anchor="middle" fill="#444">(一時 VM で検証)</text>
  </g>
  <g>
    <rect x="1220" y="180" width="190" height="96" rx="8" fill="#E9F3E6" stroke="#248814" stroke-width="2"/>
    <text x="1315" y="222" font-size="13" text-anchor="middle" fill="#222">Azure Compute</text>
    <text x="1315" y="242" font-size="13" text-anchor="middle" fill="#222">Gallery へ発行</text>
  </g>
  <g>
    <rect x="1460" y="180" width="190" height="96" rx="8" fill="#E9F3E6" stroke="#248814" stroke-width="2"/>
    <text x="1555" y="222" font-size="13" text-anchor="middle" fill="#222">必要リージョンへ</text>
    <text x="1555" y="242" font-size="13" text-anchor="middle" fill="#222">レプリケート</text>
  </g>
  <g>
    <rect x="1700" y="180" width="210" height="96" rx="8" fill="#FDE7E9" stroke="#DD344C" stroke-width="2"/>
    <text x="1805" y="214" font-size="13" text-anchor="middle" fill="#222">DevOps が VM 展開 /</text>
    <text x="1805" y="234" font-size="13" text-anchor="middle" fill="#222">Azure Policy で</text>
    <text x="1805" y="254" font-size="13" text-anchor="middle" fill="#222">承認イメージ強制</text>
  </g>

  <!-- OOB note -->
  <g>
    <rect x="500" y="324" width="500" height="66" rx="8" fill="#FFFFFF" stroke="#DD344C" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="516" y="352" font-size="12" fill="#444">緊急パッチ (OOB) は月次と独立にオンデマンドで同一パイプラインを起動</text>
    <text x="516" y="372" font-size="12" fill="#444">(脆弱版は excludeFromLatest=true で「最新」から除外)</text>
  </g>
</svg>
